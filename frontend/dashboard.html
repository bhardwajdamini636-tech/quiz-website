<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="loadDashboard()">

  <div class="container">
    <h2>Dashboard</h2>

    <button onclick="logout()">Logout</button>

    <div id="teacherPanel" class="hidden">
      <h3>Create Quiz</h3>

      <input id="quizTitle" placeholder="Title">
      <input id="quizDesc" placeholder="Description">

      <textarea id="questionsInput" placeholder='Format:
Question|Option1,Option2,Option3,Option4|CorrectIndex
Example:
2+2?|1,2,3,4|3'></textarea>

      <button onclick="createQuiz()">Create Quiz</button>
    </div>

    <h3>Quizzes</h3>
    <div id="quizzes"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
